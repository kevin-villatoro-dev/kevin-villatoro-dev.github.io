<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#2d2d2d"/>
    </linearGradient>
    <linearGradient id="lock" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a5a"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none"/>
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#grid)"/>
  <rect x="300" y="120" width="200" height="200" rx="20" fill="#2d2d2d" stroke="#444444" stroke-width="2"/>
  <rect x="340" y="80" width="120" height="80" rx="8" fill="none" stroke="#444444" stroke-width="3"/>
  <circle cx="400" cy="180" r="30" fill="none" stroke="url(#lock)" stroke-width="4"/>
  <rect x="388" y="195" width="24" height="40" rx="4" fill="url(#lock)"/>
  <text x="400" y="370" font-family="monospace" font-size="16" fill="#ffffff" opacity="0.4" text-anchor="middle">CONFIDENTIAL</text>
  <text x="400" y="400" font-family="monospace" font-size="12" fill="#ff6b6b" opacity="0.6" text-anchor="middle">API Gateway - Enterprise Project</text>
  <rect x="100" y="200" width="150" height="100" rx="8" fill="#ffffff" opacity="0.03"/>
  <rect x="550" y="200" width="150" height="100" rx="8" fill="#ffffff" opacity="0.03"/>
  <circle cx="175" cy="250" r="20" fill="#ffffff" opacity="0.05"/>
  <circle cx="625" cy="250" r="20" fill="#ffffff" opacity="0.05"/>
  <text x="400" y="480" font-family="monospace" font-size="11" fill="#666666" text-anchor="middle">Microservices Architecture</text>
