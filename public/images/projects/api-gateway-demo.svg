<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="400" y="35" fill="#94a3b8" font-family="system-ui" font-size="12" text-anchor="middle">Arquitectura de Microservicios</text>
  
  <!-- Clients -->
  <g transform="translate(40, 80)">
    <!-- Web client -->
    <rect x="0" y="0" width="90" height="50" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="45" y="25" fill="#60a5fa" font-family="system-ui" font-size="20" text-anchor="middle">🌐</text>
    <text x="45" y="42" fill="#93c5fd" font-family="system-ui" font-size="9" text-anchor="middle">Web</text>
    
    <!-- Mobile client -->
    <rect x="110" y="0" width="90" height="50" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="155" y="25" fill="#a78bfa" font-family="system-ui" font-size="20" text-anchor="middle">📱</text>
    <text x="155" y="42" fill="#c4b5fd" font-family="system-ui" font-size="9" text-anchor="middle">Mobile</text>
    
    <!-- Third party -->
    <rect x="220" y="0" width="90" height="50" rx="8" fill="#1e293b" stroke="#ec4899" stroke-width="1.5"/>
    <text x="265" y="25" fill="#f472b6" font-family="system-ui" font-size="20" text-anchor="middle">🔗</text>
    <text x="265" y="42" fill="#f9a8d4" font-family="system-ui" font-size="9" text-anchor="middle">Terceros</text>
  </g>
  
  <!-- Arrows from clients to gateway -->
  <g stroke="#475569" stroke-width="1.5" fill="none">
    <line x1="130" y1="135" x2="370" y2="200"/>
    <line x1="205" y1="135" x2="390" y2="200"/>
    <line x1="265" y1="135" x2="410" y2="200"/>
  </g>
  
  <!-- API Gateway - Central -->
  <g transform="translate(350, 190)" filter="url(#glow)">
    <rect x="0" y="0" width="100" height="120" rx="10" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
    <rect x="0" y="0" width="100" height="25" rx="10" fill="#22d3ee" opacity="0.15"/>
    <text x="50" y="17" fill="#22d3ee" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">API GATEWAY</text>
    
    <!-- Gateway features -->
    <text x="50" y="50" fill="#67e8f9" font-family="system-ui" font-size="8" text-anchor="middle">🔐 Auth</text>
    <text x="50" y="70" fill="#67e8f9" font-family="system-ui" font-size="8" text-anchor="middle">⚖️ Balance</text>
    <text x="50" y="90" fill="#67e8f9" font-family="system-ui" font-size="8" text-anchor="middle">📝 Log</text>
    <text x="50" y="110" fill="#67e8f9" font-family="system-ui" font-size="8" text-anchor="middle">🚀 Rate</text>
  </g>
  
  <!-- Arrows from gateway to services -->
  <g stroke="#475569" stroke-width="1.5" fill="none">
    <line x1="450" y1="250" x2="560" y2="180"/>
    <line x1="450" y1="250" x2="560" y2="250"/>
    <line x1="450" y1="250" x2="560" y2="320"/>
  </g>
  
  <!-- Service 1: Users/Auth -->
  <g transform="translate(560, 150)">
    <rect x="0" y="0" width="180" height="60" rx="8" fill="#0f172a" stroke="#22c55e" stroke-width="1.5"/>
    <rect x="0" y="0" width="180" height="20" rx="8" fill="#22c55e" opacity="0.1"/>
    <text x="90" y="14" fill="#4ade80" font-family="monospace" font-size="9" text-anchor="middle" font-weight="bold">USERS / AUTH</text>
    
    <!-- DB indicator -->
    <rect x="15" y="35" width="50" height="18" rx="4" fill="#1e293b"/>
    <text x="40" y="48" fill="#94a3b8" font-family="system-ui" font-size="7" text-anchor="middle">🗄️ DB</text>
    
    <!-- Endpoints -->
    <rect x="75" y="35" width="90" height="18" rx="4" fill="#1e293b"/>
    <text x="120" y="48" fill="#94a3b8" font-family="system-ui" font-size="7" text-anchor="middle">POST /login</text>
    
    <!-- JWT badge -->
    <rect x="135" y="40" width="35" height="14" rx="7" fill="#22c55e" opacity="0.3"/>
    <text x="152" y="50" fill="#4ade80" font-family="monospace" font-size="7" text-anchor="middle">JWT</text>
  </g>
  
  <!-- Service 2: Products/Catalog -->
  <g transform="translate(560, 225)">
    <rect x="0" y="0" width="180" height="55" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
    <rect x="0" y="0" width="180" height="20" rx="8" fill="#f59e0b" opacity="0.1"/>
    <text x="90" y="14" fill="#fbbf24" font-family="monospace" font-size="9" text-anchor="middle" font-weight="bold">CATÁLOGO</text>
    
    <!-- Endpoints -->
    <rect x="15" y="30" width="70" height="18" rx="4" fill="#1e293b"/>
    <text x="50" y="43" fill="#94a3b8" font-family="system-ui" font-size="7" text-anchor="middle">GET /products</text>
    <rect x="95" y="30" width="70" height="18" rx="4" fill="#1e293b"/>
    <text x="130" y="43" fill="#94a3b8" font-family="system-ui" font-size="7" text-anchor="middle">GET /search</text>
  </g>
  
  <!-- Service 3: Reporting -->
  <g transform="translate(560, 300)">
    <rect x="0" y="0" width="180" height="55" rx="8" fill="#0f172a" stroke="#a855f7" stroke-width="1.5"/>
    <rect x="0" y="0" width="180" height="20" rx="8" fill="#a855f7" opacity="0.1"/>
    <text x="90" y="14" fill="#c084fc" font-family="monospace" font-size="9" text-anchor="middle" font-weight="bold">REPORTERÍA</text>
    
    <!-- Endpoints -->
    <rect x="15" y="30" width="70" height="18" rx="4" fill="#1e293b"/>
    <text x="50" y="43" fill="#94a3b8" font-family="system-ui" font-size="7" text-anchor="middle">GET /stats</text>
    <rect x="95" y="30" width="70" height="18" rx="4" fill="#1e293b"/>
    <text x="130" y="43" fill="#94a3b8" font-family="system-ui" font-size="7" text-anchor="middle">GET /export</text>
  </g>
  
  <!-- Databases -->
  <g transform="translate(600, 390)">
    <!-- Users DB -->
    <ellipse cx="40" cy="20" rx="30" ry="10" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
    <rect x="10" y="20" width="60" height="30" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
    <ellipse cx="40" cy="50" rx="30" ry="10" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
    <text x="40" y="40" fill="#4ade80" font-family="monospace" font-size="8" text-anchor="middle">users_db</text>
    
    <!-- Products DB -->
    <ellipse cx="160" cy="20" rx="30" ry="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
    <rect x="130" y="20" width="60" height="30" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
    <ellipse cx="160" cy="50" rx="30" ry="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
    <text x="160" y="40" fill="#fbbf24" font-family="monospace" font-size="8" text-anchor="middle">catalog_db</text>
  </g>
  
  <!-- Connection lines to DBs -->
  <g stroke="#475569" stroke-width="1" stroke-dasharray="4,2" fill="none">
    <line x1="650" y1="210" x2="640" y2="390"/>
    <line x1="650" y1="280" x2="760" y2="390"/>
  </g>
  
  <!-- Badge: Node.js -->
  <rect x="40" y="460" width="80" height="25" rx="12" fill="#22c55e" opacity="0.9"/>
  <text x="80" y="477" fill="#ffffff" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">Node.js</text>
  
  <!-- Legend -->
  <g transform="translate(40, 420)">
    <text x="0" y="0" fill="#64748b" font-family="system-ui" font-size="10">Flujo:</text>
    <text x="0" y="16" fill="#94a3b8" font-family="system-ui" font-size="9">Cliente → Gateway → Servicio → DB</text>
  </g>
</svg>
