<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c2128"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bg)"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="60" fill="#0d1117" stroke="#21262d" stroke-width="0.5"/>
  <g transform="translate(20, 15)">
    <!-- Shield icon -->
    <path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7L12 2z" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="12" y="13" fill="#22d3ee" font-family="system-ui" font-size="8" text-anchor="middle">✓</text>
  </g>
  <text x="45" y="30" fill="#f0f6fc" font-family="system-ui" font-size="14" font-weight="bold">API Gateway</text>
  <text x="45" y="48" fill="#8b949e" font-family="system-ui" font-size="11">Real-time Monitoring Dashboard</text>
  <text x="1160" y="35" fill="#8b949e" font-family="system-ui" font-size="11" text-anchor="end">⚡ Port 3000</text>

  <!-- Stats Cards Row -->
  <!-- Requests/s -->
  <g transform="translate(20, 80)">
    <rect x="0" y="0" width="270" height="90" rx="10" fill="url(#cardBg)" stroke="#30363d" stroke-width="1"/>
    <text x="20" y="28" fill="#8b949e" font-family="system-ui" font-size="12">Requests/s</text>
    <circle cx="240" cy="22" r="14" fill="#1a3a5c" opacity="0.6"/>
    <text x="240" y="27" fill="#58a6ff" font-family="system-ui" font-size="14" text-anchor="middle">📈</text>
    <text x="20" y="68" fill="#f0f6fc" font-family="system-ui" font-size="36" font-weight="bold">3</text>
  </g>

  <!-- Total Requests -->
  <g transform="translate(310, 80)">
    <rect x="0" y="0" width="270" height="90" rx="10" fill="url(#cardBg)" stroke="#30363d" stroke-width="1"/>
    <text x="20" y="28" fill="#8b949e" font-family="system-ui" font-size="12">Total Requests</text>
    <circle cx="240" cy="22" r="14" fill="#1a2d4a" opacity="0.6"/>
    <text x="240" y="27" fill="#58a6ff" font-family="system-ui" font-size="14" text-anchor="middle">⇄</text>
    <text x="20" y="68" fill="#f0f6fc" font-family="system-ui" font-size="36" font-weight="bold">14</text>
  </g>

  <!-- Active Connections -->
  <g transform="translate(600, 80)">
    <rect x="0" y="0" width="270" height="90" rx="10" fill="url(#cardBg)" stroke="#30363d" stroke-width="1"/>
    <text x="20" y="28" fill="#8b949e" font-family="system-ui" font-size="12">Active Connections</text>
    <circle cx="240" cy="22" r="14" fill="#1a3a2a" opacity="0.6"/>
    <text x="240" y="27" fill="#3fb950" font-family="system-ui" font-size="14" text-anchor="middle">●</text>
    <text x="20" y="68" fill="#f0f6fc" font-family="system-ui" font-size="36" font-weight="bold">2</text>
  </g>

  <!-- Errors -->
  <g transform="translate(890, 80)">
    <rect x="0" y="0" width="270" height="90" rx="10" fill="url(#cardBg)" stroke="#30363d" stroke-width="1"/>
    <text x="20" y="28" fill="#8b949e" font-family="system-ui" font-size="12">Errors</text>
    <circle cx="240" cy="22" r="14" fill="#3a1a1a" opacity="0.6"/>
    <text x="240" y="27" fill="#f85149" font-family="system-ui" font-size="14" text-anchor="middle">⚠</text>
    <text x="20" y="68" fill="#f0f6fc" font-family="system-ui" font-size="36" font-weight="bold">0</text>
  </g>

  <!-- Disconnected status -->
  <g transform="translate(20, 185)">
    <circle cx="6" cy="6" r="5" fill="#f85149"/>
    <text x="18" y="10" fill="#f85149" font-family="system-ui" font-size="12">Disconnected - Reconnecting...</text>
  </g>

  <!-- Traffic Chart Card -->
  <g transform="translate(20, 220)">
    <rect x="0" y="0" width="780" height="320" rx="10" fill="url(#cardBg)" stroke="#30363d" stroke-width="1"/>
    <text x="20" y="30" fill="#f0f6fc" font-family="system-ui" font-size="14" font-weight="bold">Traffic (Last 60s)</text>

    <!-- Chart area -->
    <g transform="translate(50, 50)">
      <!-- Y-axis labels -->
      <text x="-10" y="195" fill="#484f58" font-family="system-ui" font-size="10" text-anchor="end">0</text>
      <text x="-10" y="155" fill="#484f58" font-family="system-ui" font-size="10" text-anchor="end">0.75</text>
      <text x="-10" y="115" fill="#484f58" font-family="system-ui" font-size="10" text-anchor="end">1.5</text>
      <text x="-10" y="75" fill="#484f58" font-family="system-ui" font-size="10" text-anchor="end">2.25</text>
      <text x="-10" y="35" fill="#484f58" font-family="system-ui" font-size="10" text-anchor="end">3</text>

      <!-- Grid lines -->
      <g stroke="#21262d" stroke-width="0.5">
        <line x1="0" y1="0" x2="700" y2="0"/>
        <line x1="0" y1="40" x2="700" y2="40"/>
        <line x1="0" y1="80" x2="700" y2="80"/>
        <line x1="0" y1="120" x2="700" y2="120"/>
        <line x1="0" y1="160" x2="700" y2="160"/>
        <line x1="0" y1="195" x2="700" y2="195"/>
      </g>

      <!-- X-axis labels -->
      <g fill="#484f58" font-family="system-ui" font-size="9">
        <text x="0" y="215">0</text>
        <text x="11" y="215">2</text>
        <text x="23" y="215">4</text>
        <text x="35" y="215">6</text>
        <text x="47" y="215">8</text>
        <text x="59" y="215">10</text>
        <text x="70" y="215">12</text>
        <text x="82" y="215">14</text>
        <text x="94" y="215">16</text>
        <text x="106" y="215">18</text>
        <text x="118" y="215">20</text>
        <text x="130" y="215">22</text>
        <text x="141" y="215">24</text>
        <text x="153" y="215">26</text>
        <text x="165" y="215">28</text>
        <text x="177" y="215">30</text>
        <text x="189" y="215">32</text>
        <text x="201" y="215">34</text>
        <text x="212" y="215">36</text>
        <text x="224" y="215">38</text>
        <text x="236" y="215">40</text>
        <text x="248" y="215">42</text>
        <text x="260" y="215">44</text>
        <text x="272" y="215">46</text>
        <text x="283" y="215">48</text>
        <text x="295" y="215">50</text>
        <text x="307" y="215">52</text>
        <text x="319" y="215">54</text>
        <text x="331" y="215">56</text>
        <text x="342" y="215">58</text>
        <text x="354" y="215">59</text>
      </g>

      <!-- Traffic line (flat at ~3) -->
      <line x1="0" y1="0" x2="360" y2="0" stroke="#22d3ee" stroke-width="2" filter="url(#softGlow)"/>

      <!-- Subtle area fill -->
      <path d="M0,0 L360,0 L360,195 L0,195 Z" fill="#22d3ee" opacity="0.03"/>
    </g>
  </g>

  <!-- Service Status Card -->
  <g transform="translate(820, 220)">
    <rect x="0" y="0" width="340" height="200" rx="10" fill="url(#cardBg)" stroke="#30363d" stroke-width="1"/>
    <g transform="translate(20, 25)">
      <!-- Icon -->
      <rect x="0" y="0" width="20" height="20" rx="4" fill="#30363d"/>
      <text x="10" y="14" fill="#f0f6fc" font-family="system-ui" font-size="10" text-anchor="middle">☰</text>
      <text x="30" y="15" fill="#f0f6fc" font-family="system-ui" font-size="14" font-weight="bold">Service Status</text>
    </g>

    <!-- Users service -->
    <g transform="translate(20, 65)">
      <rect x="0" y="0" width="300" height="36" rx="8" fill="#1c2128"/>
      <circle cx="14" cy="18" r="5" fill="#f85149"/>
      <text x="28" y="22" fill="#f0f6fc" font-family="system-ui" font-size="13">Users</text>
      <circle cx="270" cy="18" r="5" fill="#f85149"/>
      <text x="282" y="22" fill="#f85149" font-family="system-ui" font-size="11">Down</text>
    </g>

    <!-- Products service -->
    <g transform="translate(20, 110)">
      <rect x="0" y="0" width="300" height="36" rx="8" fill="#1c2128"/>
      <circle cx="14" cy="18" r="5" fill="#f85149"/>
      <text x="28" y="22" fill="#f0f6fc" font-family="system-ui" font-size="13">Products</text>
      <circle cx="270" cy="18" r="5" fill="#f85149"/>
      <text x="282" y="22" fill="#f85149" font-family="system-ui" font-size="11">Down</text>
    </g>

    <!-- Orders service -->
    <g transform="translate(20, 155)">
      <rect x="0" y="0" width="300" height="36" rx="8" fill="#1c2128"/>
      <circle cx="14" cy="18" r="5" fill="#f85149"/>
      <text x="28" y="22" fill="#f0f6fc" font-family="system-ui" font-size="13">Orders</text>
      <circle cx="270" cy="18" r="5" fill="#f85149"/>
      <text x="282" y="22" fill="#f85149" font-family="system-ui" font-size="11">Down</text>
    </g>
  </g>

  <!-- Errors by Service Card -->
  <g transform="translate(20, 560)">
    <rect x="0" y="0" width="1140" height="290" rx="10" fill="url(#cardBg)" stroke="#30363d" stroke-width="1"/>
    <text x="20" y="30" fill="#f0f6fc" font-family="system-ui" font-size="14" font-weight="bold">Errors by Service</text>
    <text x="570" y="170" fill="#484f58" font-family="system-ui" font-size="14" text-anchor="middle">No errors recorded yet</text>
  </g>

  <!-- Footer -->
  <text x="600" y="880" fill="#484f58" font-family="system-ui" font-size="11" text-anchor="middle">API Gateway Dashboard - Built with Fastify + React</text>
</svg>
