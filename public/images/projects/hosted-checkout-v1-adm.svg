<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B2D8E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B1D6E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD100;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFC107;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.08);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.02);stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Space Grotesk, sans-serif" font-size="16" fill="url(#accentGrad)" text-anchor="middle" font-weight="600">Reportes y Analytics</text>
  
  <!-- TOP ROW: Stats Cards -->
  <g transform="translate(50, 60)">
    <!-- Total Revenue -->
    <rect x="0" y="0" width="160" height="80" rx="10" fill="url(#cardGrad)" stroke="rgba(139,45,142,0.3)" stroke-width="1"/>
    <text x="20" y="25" font-family="Inter, sans-serif" font-size="10" fill="#a0a0b0">Ingresos Totales</text>
    <text x="20" y="55" font-family="Space Grotesk, sans-serif" font-size="24" fill="#FFD100" font-weight="700">Q 89,450</text>
    <text x="20" y="72" font-family="Inter, sans-serif" font-size="9" fill="#34d399">+12.5% vs mes anterior</text>
    
    <!-- Total Transactions -->
    <rect x="180" y="0" width="160" height="80" rx="10" fill="url(#cardGrad)" stroke="rgba(139,45,142,0.3)" stroke-width="1"/>
    <text x="200" y="25" font-family="Inter, sans-serif" font-size="10" fill="#a0a0b0">Transacciones</text>
    <text x="200" y="55" font-family="Space Grotesk, sans-serif" font-size="24" fill="#8B2D8E" font-weight="700">1,247</text>
    <text x="200" y="72" font-family="Inter, sans-serif" font-size="9" fill="#34d399">+8.3% vs mes anterior</text>
    
    <!-- Success Rate -->
    <rect x="360" y="0" width="160" height="80" rx="10" fill="url(#cardGrad)" stroke="rgba(52,211,153,0.3)" stroke-width="1"/>
    <text x="380" y="25" font-family="Inter, sans-serif" font-size="10" fill="#a0a0b0">Tasa de Éxito</text>
    <text x="380" y="55" font-family="Space Grotesk, sans-serif" font-size="24" fill="#34d399" font-weight="700">94.2%</text>
    <text x="380" y="72" font-family="Inter, sans-serif" font-size="9" fill="#34d399">+2.1% vs mes anterior</text>
    
    <!-- Avg Transaction -->
    <rect x="540" y="0" width="160" height="80" rx="10" fill="url(#cardGrad)" stroke="rgba(255,209,0,0.3)" stroke-width="1"/>
    <text x="560" y="25" font-family="Inter, sans-serif" font-size="10" fill="#a0a0b0">Ticket Promedio</text>
    <text x="560" y="55" font-family="Space Grotesk, sans-serif" font-size="24" fill="#FFD100" font-weight="700">Q 717</text>
    <text x="560" y="72" font-family="Inter, sans-serif" font-size="9" fill="#34d399">+5.2% vs mes anterior</text>
  </g>
  
  <!-- MIDDLE ROW: Charts -->
  <g transform="translate(50, 160)">
    <!-- Revenue Chart -->
    <rect x="0" y="0" width="380" height="200" rx="10" fill="url(#cardGrad)" stroke="rgba(139,45,142,0.3)" stroke-width="1"/>
    <text x="20" y="25" font-family="Inter, sans-serif" font-size="11" fill="#f0f0f5" font-weight="500">Ingresos por Mes</text>
    
    <!-- Bar Chart -->
    <g transform="translate(20, 45)">
      <!-- Bars -->
      <rect x="0" y="100" width="35" height="40" rx="4" fill="rgba(139,45,142,0.3)"/>
      <rect x="50" y="70" width="35" height="70" rx="4" fill="rgba(139,45,142,0.4)"/>
      <rect x="100" y="50" width="35" height="90" rx="4" fill="rgba(139,45,142,0.5)"/>
      <rect x="150" y="30" width="35" height="110" rx="4" fill="url(#purpleGrad)"/>
      <rect x="200" y="45" width="35" height="95" rx="4" fill="rgba(139,45,142,0.5)"/>
      <rect x="250" y="20" width="35" height="120" rx="4" fill="url(#accentGrad)"/>
      <rect x="300" y="40" width="35" height="100" rx="4" fill="rgba(139,45,142,0.5)"/>
      
      <!-- Labels -->
      <text x="17" y="155" font-family="Inter, sans-serif" font-size="8" fill="#6b6b80" text-anchor="middle">Ene</text>
      <text x="67" y="155" font-family="Inter, sans-serif" font-size="8" fill="#6b6b80" text-anchor="middle">Feb</text>
      <text x="117" y="155" font-family="Inter, sans-serif" font-size="8" fill="#6b6b80" text-anchor="middle">Mar</text>
      <text x="167" y="155" font-family="Inter, sans-serif" font-size="8" fill="#6b6b80" text-anchor="middle">Abr</text>
      <text x="217" y="155" font-family="Inter, sans-serif" font-size="8" fill="#6b6b80" text-anchor="middle">May</text>
      <text x="267" y="155" font-family="Inter, sans-serif" font-size="8" fill="#FFD100" text-anchor="middle" font-weight="600">Jun</text>
      <text x="317" y="155" font-family="Inter, sans-serif" font-size="8" fill="#6b6b80" text-anchor="middle">Jul</text>
    </g>
    
    <!-- Payment Methods Chart -->
    <rect x="400" y="0" width="300" height="200" rx="10" fill="url(#cardGrad)" stroke="rgba(139,45,142,0.3)" stroke-width="1"/>
    <text x="420" y="25" font-family="Inter, sans-serif" font-size="11" fill="#f0f0f5" font-weight="500">Métodos de Pago</text>
    
    <!-- Donut Chart -->
    <g transform="translate(520, 110)">
      <circle cx="0" cy="0" r="60" fill="none" stroke="rgba(139,45,142,0.3)" stroke-width="20"/>
      <circle cx="0" cy="0" r="60" fill="none" stroke="#8B2D8E" stroke-width="20" stroke-dasharray="150 230" stroke-dashoffset="0"/>
      <circle cx="0" cy="0" r="60" fill="none" stroke="#FFD100" stroke-width="20" stroke-dasharray="80 300" stroke-dashoffset="-150"/>
      <circle cx="0" cy="0" r="60" fill="none" stroke="#34d399" stroke-width="20" stroke-dasharray="60 320" stroke-dashoffset="-230"/>
      <circle cx="0" cy="0" r="45" fill="url(#bgGrad)"/>
      <text x="0" y="5" font-family="Space Grotesk, sans-serif" font-size="14" fill="#f0f0f5" text-anchor="middle" font-weight="600">1,247</text>
    </g>
    
    <!-- Legend -->
    <g transform="translate(600, 55)">
      <circle cx="0" cy="0" r="5" fill="#8B2D8E"/>
      <text x="15" y="4" font-family="Inter, sans-serif" font-size="9" fill="#a0a0b0">Tarjeta (45%)</text>
      
      <circle cx="0" cy="25" r="5" fill="#FFD100"/>
      <text x="15" y="29" font-family="Inter, sans-serif" font-size="9" fill="#a0a0b0">G Pay (25%)</text>
      
      <circle cx="0" cy="50" r="5" fill="#34d399"/>
      <text x="15" y="54" font-family="Inter, sans-serif" font-size="9" fill="#a0a0b0">Apple Pay (20%)</text>
      
      <circle cx="0" cy="75" r="5" fill="#6b6b80"/>
      <text x="15" y="79" font-family="Inter, sans-serif" font-size="9" fill="#a0a0b0">Otros (10%)</text>
    </g>
  </g>
  
  <!-- BOTTOM: Recent Transactions Table -->
  <g transform="translate(50, 380)">
    <rect x="0" y="0" width="700" height="100" rx="10" fill="url(#cardGrad)" stroke="rgba(139,45,142,0.3)" stroke-width="1"/>
    <text x="20" y="25" font-family="Inter, sans-serif" font-size="11" fill="#f0f0f5" font-weight="500">Últimas Transacciones</text>
    
    <!-- Table Header -->
    <text x="20" y="50" font-family="Inter, sans-serif" font-size="9" fill="#6b6b80">ID</text>
    <text x="120" y="50" font-family="Inter, sans-serif" font-size="9" fill="#6b6b80">Cliente</text>
    <text x="280" y="50" font-family="Inter, sans-serif" font-size="9" fill="#6b6b80">Monto</text>
    <text x="380" y="50" font-family="Inter, sans-serif" font-size="9" fill="#6b6b80">Método</text>
    <text x="500" y="50" font-family="Inter, sans-serif" font-size="9" fill="#6b6b80">Estado</text>
    <text x="600" y="50" font-family="Inter, sans-serif" font-size="9" fill="#6b6b80">Fecha</text>
    
    <!-- Row 1 -->
    <line x1="20" y1="58" x2="680" y2="58" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <text x="20" y="75" font-family="Inter, sans-serif" font-size="9" fill="#a0a0b0">#TXN-001</text>
    <text x="120" y="75" font-family="Inter, sans-serif" font-size="9" fill="#f0f0f5">María García</text>
    <text x="280" y="75" font-family="Space Grotesk, sans-serif" font-size="10" fill="#FFD100" font-weight="600">Q 350.00</text>
    <text x="380" y="75" font-family="Inter, sans-serif" font-size="9" fill="#8B2D8E">G Pay</text>
    <rect x="500" y="63" width="50" height="18" rx="9" fill="rgba(52,211,153,0.2)"/>
    <text x="525" y="76" font-family="Inter, sans-serif" font-size="8" fill="#34d399" text-anchor="middle">Exitoso</text>
    <text x="600" y="75" font-family="Inter, sans-serif" font-size="9" fill="#a0a0b0">Hace 2min</text>
    
    <!-- Row 2 -->
    <text x="20" y="95" font-family="Inter, sans-serif" font-size="9" fill="#a0a0b0">#TXN-002</text>
    <text x="120" y="95" font-family="Inter, sans-serif" font-size="9" fill="#f0f0f5">Carlos López</text>
    <text x="280" y="95" font-family="Space Grotesk, sans-serif" font-size="10" fill="#FFD100" font-weight="600">Q 1,200.00</text>
    <text x="380" y="95" font-family="Inter, sans-serif" font-size="9" fill="#8B2D8E">Apple Pay</text>
    <rect x="500" y="83" width="50" height="18" rx="9" fill="rgba(52,211,153,0.2)"/>
    <text x="525" y="96" font-family="Inter, sans-serif" font-size="8" fill="#34d399" text-anchor="middle">Exitoso</text>
    <text x="600" y="95" font-family="Inter, sans-serif" font-size="9" fill="#a0a0b0">Hace 15min</text>
  </g>
</svg>