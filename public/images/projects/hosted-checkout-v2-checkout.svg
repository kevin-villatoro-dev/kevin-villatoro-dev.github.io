<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2440;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#ffffff"/>
  
  <!-- Divider line -->
  <line x1="400" y1="50" x2="400" y2="450" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- LEFT SIDE: Admin Dashboard -->
  <g transform="translate(50, 80)">
    <!-- Dashboard Card -->
    <rect x="0" y="0" width="300" height="340" rx="12" fill="url(#cardGrad)" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- Dashboard Header -->
    <rect x="0" y="0" width="300" height="50" rx="12" fill="url(#blueGrad)"/>
    <rect x="0" y="38" width="300" height="12" fill="url(#blueGrad)"/>
    <circle cx="25" cy="25" r="8" fill="#ff5f57"/>
    <circle cx="45" cy="25" r="8" fill="#ffbd2e"/>
    <circle cx="65" cy="25" r="8" fill="#28c840"/>
    <text x="150" y="30" font-family="Inter, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Panel Administrativo</text>
    
    <!-- Stats Row -->
    <rect x="15" y="65" width="85" height="60" rx="8" fill="rgba(26,54,93,0.08)" stroke="rgba(26,54,93,0.2)" stroke-width="1"/>
    <text x="57" y="85" font-family="Inter, sans-serif" font-size="10" fill="#1a365d" text-anchor="middle">Ventas</text>
    <text x="57" y="105" font-family="Space Grotesk, sans-serif" font-size="18" fill="#1a365d" text-anchor="middle" font-weight="600">$12.5K</text>
    
    <rect x="110" y="65" width="85" height="60" rx="8" fill="rgba(26,54,93,0.08)" stroke="rgba(26,54,93,0.2)" stroke-width="1"/>
    <text x="152" y="85" font-family="Inter, sans-serif" font-size="10" fill="#1a365d" text-anchor="middle">Órdenes</text>
    <text x="152" y="105" font-family="Space Grotesk, sans-serif" font-size="18" fill="#1a365d" text-anchor="middle" font-weight="600">847</text>
    
    <rect x="205" y="65" width="85" height="60" rx="8" fill="rgba(26,54,93,0.08)" stroke="rgba(26,54,93,0.2)" stroke-width="1"/>
    <text x="247" y="85" font-family="Inter, sans-serif" font-size="10" fill="#1a365d" text-anchor="middle">Clientes</text>
    <text x="247" y="105" font-family="Space Grotesk, sans-serif" font-size="18" fill="#1a365d" text-anchor="middle" font-weight="600">1.2K</text>
    
    <!-- Chart placeholder -->
    <rect x="15" y="140" width="270" height="120" rx="8" fill="#f8fafc"/>
    <polyline points="30,220 70,180 110,200 150,160 190,170 230,140 270,150" fill="none" stroke="url(#blueGrad)" stroke-width="2"/>
    <circle cx="30" cy="220" r="4" fill="#1a365d"/>
    <circle cx="70" cy="180" r="4" fill="#1a365d"/>
    <circle cx="110" cy="200" r="4" fill="#1a365d"/>
    <circle cx="150" cy="160" r="4" fill="#f59e0b"/>
    <circle cx="190" cy="170" r="4" fill="#f59e0b"/>
    <circle cx="230" cy="140" r="4" fill="#f59e0b"/>
    <circle cx="270" cy="150" r="4" fill="#f59e0b"/>
    
    <!-- Table rows -->
    <rect x="15" y="275" width="270" height="25" rx="4" fill="#f1f5f9"/>
    <rect x="25" y="283" width="60" height="8" rx="2" fill="rgba(26,54,93,0.2)"/>
    <rect x="95" y="283" width="40" height="8" rx="2" fill="rgba(26,54,93,0.15)"/>
    <rect x="145" y="283" width="50" height="8" rx="2" fill="rgba(245,158,11,0.3)"/>
    
    <rect x="15" y="305" width="270" height="25" rx="4" fill="#f8fafc"/>
    <rect x="25" y="313" width="50" height="8" rx="2" fill="rgba(26,54,93,0.15)"/>
    <rect x="85" y="313" width="45" height="8" rx="2" fill="rgba(26,54,93,0.2)"/>
    <rect x="140" y="313" width="45" height="8" rx="2" fill="rgba(245,158,11,0.3)"/>
    
    <!-- Label -->
    <text x="150" y="365" font-family="Inter, sans-serif" font-size="11" fill="#1a365d" text-anchor="middle">Control de ventas en tiempo real</text>
  </g>
  
  <!-- RIGHT SIDE: Checkout (Mobile Phone Mockup) -->
  <g transform="translate(480, 60)">
    <!-- Phone Frame -->
    <rect x="0" y="0" width="240" height="380" rx="24" fill="#1a1a1a" stroke="#333" stroke-width="3"/>
    <rect x="8" y="8" width="224" height="364" rx="20" fill="#ffffff"/>
    
    <!-- Status Bar -->
    <rect x="8" y="8" width="224" height="35" rx="20" fill="#f1f5f9"/>
    <rect x="8" y="23" width="224" height="20" fill="#f1f5f9"/>
    <text x="30" y="30" font-family="Inter, sans-serif" font-size="11" fill="#1a365d" font-weight="500">3:52</text>
    <text x="190" y="30" font-family="Inter, sans-serif" font-size="9" fill="#1a365d">5G</text>
    
    <!-- Header -->
    <rect x="8" y="43" width="224" height="80" fill="url(#blueGrad)"/>
    <circle cx="60" cy="83" r="20" fill="rgba(255,255,255,0.2)"/>
    <text x="60" y="88" font-family="Inter, sans-serif" font-size="18" fill="#fff" text-anchor="middle" font-weight="700">N</text>
    
    <!-- Amount -->
    <rect x="28" y="135" width="184" height="50" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="55" y="165" font-family="Inter, sans-serif" font-size="12" fill="#64748b">Monto:</text>
    <text x="170" y="165" font-family="Space Grotesk, sans-serif" font-size="18" fill="#1a365d" text-anchor="end" font-weight="700">Q350.00</text>
    
    <!-- Payment Tabs -->
    <rect x="28" y="195" width="60" height="30" rx="15" fill="#f1f5f9" stroke="#1a365d" stroke-width="1.5"/>
    <text x="58" y="215" font-family="Inter, sans-serif" font-size="10" fill="#1a365d" text-anchor="middle">Cuotas</text>
    
    <text x="110" y="215" font-family="Inter, sans-serif" font-size="11" fill="#64748b">Puntos</text>
    <text x="165" y="215" font-family="Inter, sans-serif" font-size="11" fill="#1a365d" font-weight="600">Contado</text>
    
    <!-- G Pay Button -->
    <rect x="28" y="235" width="184" height="35" rx="6" fill="#000"/>
    <text x="120" y="257" font-family="Inter, sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="500">G Pay</text>
    
    <!-- Apple Pay Button -->
    <rect x="28" y="278" width="184" height="35" rx="6" fill="#000"/>
    <g transform="translate(92, 291)">
      <path d="M8.5 0.3c-0.8 0-1.8 0.5-2.4 0.5-0.6 0-1.6-0.5-2.6-0.5-1.3 0-2.5 0.7-3.2 1.9-1.4 2.4-0.3 6 1 7.9 0.6 1 1.4 2 2.4 2 0.9 0 1.3-0.6 2.5-0.6 1.2 0 1.5 0.6 2.5 0.6 1 0 1.7-1 2.4-1.9 0.4-0.6 0.7-1.2 1-1.5-1.4-0.6-2.4-2.1-2.4-3.8 0-1.6 1-3 2.2-3.5-0.9-1.1-2-1.1-2.4-1.1z" fill="#fff"/>
    </g>
    <text x="125" y="300" font-family="Inter, sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="500">Pay</text>
    
    <!-- Card Button -->
    <rect x="28" y="321" width="184" height="35" rx="6" fill="url(#orangeGrad)"/>
    <g transform="translate(63, 330)">
      <rect x="0" y="0" width="16" height="12" rx="2" fill="none" stroke="#fff" stroke-width="1.5"/>
      <line x1="0" y1="4" x2="16" y2="4" stroke="#fff" stroke-width="1.5"/>
      <line x1="3" y1="8" x2="8" y2="8" stroke="#fff" stroke-width="1"/>
    </g>
    <text x="133" y="343" font-family="Inter, sans-serif" font-size="10" fill="#fff" text-anchor="middle">Finalizar con tarjeta</text>
    
    <!-- Card Logos -->
    <rect x="70" y="365" width="30" height="18" rx="3" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="85" y="377" font-family="Inter, sans-serif" font-size="7" fill="#1a365d" text-anchor="middle" font-weight="700">VISA</text>
    
    <rect x="110" y="365" width="30" height="18" rx="3" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="118" cy="374" r="6" fill="#eb001b"/>
    <circle cx="132" cy="374" r="6" fill="#f79e1b"/>
    <rect x="121" y="368" width="10" height="12" fill="#ff5f00"/>
  </g>
  
  <!-- Title -->
  <text x="400" y="480" font-family="Space Grotesk, sans-serif" font-size="14" fill="#1a365d" text-anchor="middle" font-weight="600">Hosted Checkout Solution</text>
</svg>
