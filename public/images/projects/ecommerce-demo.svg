    <text x="67" y="341" fill="#ffffff" font-family="system-ui" font-size="8" text-anchor="middle">Agregar</text>
    <rect x="140" y="325" width="85" height="24" rx="4" fill="#6366f1"/>
    <text x="182" y="341" fill="#ffffff" font-family="system-ui" font-size="8" text-anchor="middle">Agregar</text>
    <rect x="255" y="325" width="85" height="24" rx="4" fill="#6366f1"/>
    <text x="297" y="341" fill="#ffffff" font-family="system-ui" font-size="8" text-anchor="middle">Agregar</text>
    
