    <rect x="255" y="195" width="85" height="60" rx="4" fill="#e5e7eb"/>
    <text x="297" y="230" fill="#9ca3af" font-family="system-ui" font-size="20" text-anchor="middle">⌨️</text>
    <text x="255" y="275" fill="#111827" font-family="system-ui" font-size="9">Teclado RGB</text>
    <text x="255" y="290" fill="#6366f1" font-family="system-ui" font-size="10" font-weight="bold">$89</text>
    <text x="255" y="305" fill="#9ca3af" font-family="system-ui" font-size="8" text-decoration="line-through">$129</text>
    
