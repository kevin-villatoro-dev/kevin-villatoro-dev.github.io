    <text x="285" y="235" fill="#1e293b" font-family="system-ui" font-size="9">142</text>
    <rect x="330" y="225" width="45" height="16" rx="8" fill="#dcfce7"/>
    <text x="352" y="237" fill="#166534" font-family="system-ui" font-size="7" text-anchor="middle">Activo</text>
